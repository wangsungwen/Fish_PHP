<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚菜共生智慧管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .card-header {
            font-weight: bold;
            color: white;
        }

        .video-container {
            background-color: #000;
            width: 100%;
        }

        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            transition: background-color 0.3s;
        }

        .status-online {
            background-color: #28a745;
            box-shadow: 0 0 5px #28a745;
        }

        .status-offline {
            background-color: #dc3545;
        }

        #toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
        }

        iframe {
            border: none;
        }

        .device-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .log-container {
            max-height: 250px;
            overflow-y: auto;
        }

        .table-sticky thead {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            z-index: 10;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4 sticky-top">
        <div class="container-fluid d-flex justify-content-between">
            <span class="navbar-brand mb-0 h1"><i class="fas fa-fish me-2"></i>魚菜共生智慧管理平台</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" style="font-size: 0.9rem;">
                    <span id="mqtt-status-dot" class="status-dot"></span>
                    <span id="status-text">MQTT 待連線</span>
                </span>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row g-4 mb-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary"><i class="fas fa-video me-2"></i>即時影像監控 (雙鏡頭)</div>
                    <div class="card-body p-3">
                        <div class="row g-3">
                            <div class="col-lg-6">
                                <div class="video-container"
                                    style="position: relative; width: 100%; height: 0; padding-bottom: 56.25%;">
                                    <iframe id="cam-iframe" src=""
                                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="video-container"
                                    style="position: relative; width: 100%; height: 0; padding-bottom: 56.25%;">
                                    <iframe id="cam-iframe-2" src=""
                                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
                                </div>
                            </div>
                        </div>
                        <div class="accordion mt-3" id="accordionSettings">
                            <div class="accordion-item bg-dark border-secondary">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed bg-dark text-white shadow-none"
                                        type="button" data-bs-toggle="collapse" data-bs-target="#collapseSettings">
                                        <i class="fas fa-tools me-2"></i> 系統通訊與設備參數設定
                                    </button>
                                </h2>
                                <div id="collapseSettings" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionSettings">
                                    <div class="accordion-body text-white">
                                        <form onsubmit="saveSettings(event)">
                                            <div class="row g-2">
                                                <div class="col-12 mb-1 border-bottom border-secondary pb-1"><small
                                                        class="text-info fw-bold">硬體控制板 UUID 設定</small></div>
                                                <div class="col-md-6 mb-2">
                                                    <label class="small text-muted">過濾/餵食板 UUID</label>
                                                    <input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="uuid_pump_feeder" required>
                                                </div>
                                                <div class="col-md-6 mb-2">
                                                    <label class="small text-muted">水族燈板 UUID</label>
                                                    <input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="uuid_light" required>
                                                </div>
                                                <div class="col-12 mb-1 border-bottom border-secondary pb-1 mt-2"><small
                                                        class="text-info fw-bold">MQTT 連線與 Topic</small></div>
                                                <div class="col-md-8 mb-2"><label class="small text-muted">Broker
                                                        URL</label><input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="mqtt_broker" required></div>
                                                <div class="col-md-4 mb-2"><label
                                                        class="small text-muted">Port</label><input type="number"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="mqtt_port" required></div>
                                                <div class="col-12 mb-2"><label class="small text-muted">感測器
                                                        Topic</label><input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="topic_sensors"></div>
                                                <div class="col-12 mb-1 border-bottom border-secondary pb-1 mt-2"><small
                                                        class="text-info fw-bold">影像與 Telegram</small></div>
                                                <div class="col-md-6 mb-2"><label class="small text-muted">CAM
                                                        1</label><input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="rtsp_url"></div>
                                                <div class="col-md-6 mb-2"><label class="small text-muted">CAM
                                                        2</label><input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="rtsp_url_2"></div>
                                                <div class="col-md-6 mb-2"><label
                                                        class="small text-muted">Token</label><input type="password"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="telegram_bot_token"></div>
                                                <div class="col-md-6 mb-2"><label class="small text-muted">Chat
                                                        ID</label><input type="text"
                                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                                        id="telegram_chat_id"></div>
                                                <div class="col-12 text-end mt-2"><button type="submit"
                                                        class="btn btn-primary btn-sm">儲存設定</button></div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-success text-white"><i class="fas fa-chart-line me-2"></i>水質環境監測</div>
                    <div class="card-body">
                        <div class="row g-2 text-center">
                            <div class="col-6 border rounded p-2 bg-white"><small class="text-muted">水溫</small><br><span
                                    id="val_temp" class="fs-4 fw-bold">--</span> <small>°C</small></div>
                            <div class="col-6 border rounded p-2 bg-white"><small class="text-muted">PH
                                    值</small><br><span id="val_ph" class="fs-4 fw-bold">--</span></div>
                            <div class="col-6 border rounded p-2 bg-white"><small
                                    class="text-muted">TDS</small><br><span id="val_tds" class="fs-4 fw-bold">--</span>
                                <small>ppm</small></div>
                            <div class="col-6 border rounded p-2 bg-white"><small
                                    class="text-muted">混濁度</small><br><span id="val_ntu" class="fs-4 fw-bold">--</span>
                                <small>NTU</small></div>
                            <div class="col-12 mt-2">
                                <div class="border rounded p-2 bg-white text-start">
                                    <div class="d-flex justify-content-between mb-1"><small
                                            class="text-muted">水位</small><small id="val_level"
                                            class="text-muted">--</small></div>
                                    <div class="progress" style="height: 12px;">
                                        <div id="bar_level" class="progress-bar bg-info" style="width: 0%;">0%</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-dark text-white"><i class="fas fa-cogs me-2"></i>環境設備控制</div>
                    <div class="card-body">
                        <div class="mb-3 border-bottom pb-2">
                            <div class="d-flex justify-content-between align-items-center"><span>循環過濾 (沖水)</span><span
                                    id="status-pump" class="device-status bg-secondary text-white">未知</span></div>
                            <div class="btn-group w-100 mt-1">
                                <button class="btn btn-outline-success btn-sm"
                                    onclick="triggerDevice('pump', 'ON')">開啟</button>
                                <button class="btn btn-outline-danger btn-sm"
                                    onclick="triggerDevice('pump', 'OFF')">關閉</button>
                            </div>
                        </div>
                        <div class="mb-3 border-bottom pb-2">
                            <div class="d-flex justify-content-between align-items-center"><span>水族燈</span><span
                                    id="status-light" class="device-status bg-secondary text-white">未知</span></div>
                            <div class="btn-group w-100 mt-1">
                                <button class="btn btn-outline-success btn-sm"
                                    onclick="triggerDevice('light', 'ON')">開啟</button>
                                <button class="btn btn-outline-danger btn-sm"
                                    onclick="triggerDevice('light', 'OFF')">關閉</button>
                            </div>
                        </div>
                        <button class="btn btn-warning btn-sm w-100 mt-1" onclick="triggerDevice('feeder')">🍖
                            手動餵食一次</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-warning text-dark"><i class="fas fa-robot me-2"></i>清洗平台控制</div>
                    <div class="card-body text-center">
                        <p class="text-muted small mb-3">控制清洗裝置移動或自動清洗</p>
                        <div class="d-flex justify-content-center gap-2 mb-3">
                            <button class="btn btn-secondary flex-grow-1" onclick="pub('fish/control/motor1', '1')"><i
                                    class="fas fa-arrow-up"></i> 前進</button>
                            <button class="btn btn-secondary flex-grow-1" onclick="pub('fish/control/motor1', '2')"><i
                                    class="fas fa-arrow-down"></i> 後退</button>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-danger flex-grow-1" onclick="pub('fish/control/motor1', '0')"><i
                                    class="fas fa-stop-circle me-1"></i>停止</button>
                            <button class="btn btn-info text-white flex-grow-1"
                                onclick="pub('fish/control/motor1', '3')"><i class="fas fa-magic me-1"></i>一鍵清洗</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white"><i class="fas fa-list-ul me-2"></i>系統事件紀錄 (最近 20 筆)
                    </div>
                    <div class="card-body p-0 log-container">
                        <table class="table table-striped table-hover mb-0 small table-sticky">
                            <thead>
                                <tr>
                                    <th>時間</th>
                                    <th>類型</th>
                                    <th>訊息</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body">
                                <tr>
                                    <td colspan="3" class="text-center py-3 text-muted">等待系統數據同步...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-msg"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let mqttClient = null;
        let currentUuidPumpFeeder = "1afe34d3020b";
        let currentUuidLight = "a220a61487a6";

        function triggerDevice(deviceType, state = null) {
            let baseUrl = "http://www.homeyes.com.tw/device/switch.php?qos=2";
            let url = ""; let msg = "";

            if (deviceType === 'pump') {
                url = `${baseUrl}&id=${currentUuidPumpFeeder}&D5=${state === 'ON' ? 'ON' : 'OFF'}`;
                msg = state === 'ON' ? '過濾開啟' : '過濾關閉';
            } else if (deviceType === 'light') {
                url = `${baseUrl}&id=${currentUuidLight}&D5=${state === 'ON' ? 'OFF' : 'ON'}`;
                msg = state === 'ON' ? '燈光開啟' : '燈光關閉';
            } else if (deviceType === 'feeder') {
                url = `${baseUrl}&id=${currentUuidPumpFeeder}&D6=ON&P6=2`;
                msg = '發送餵食指令';
            }

            new Image().src = url + "&t=" + new Date().getTime();
            showToast(msg);
            logEventToServer('MANUAL', msg);

            if (deviceType !== 'feeder' && state !== null) {
                updateDeviceUI(deviceType, state);
                if (mqttClient && mqttClient.isConnected()) {
                    let mqttMsg = new Paho.MQTT.Message(state);
                    mqttMsg.destinationName = "ttu_fish/state/" + deviceType;
                    mqttMsg.retained = true;
                    mqttClient.send(mqttMsg);
                }
            }
        }

        function updateDeviceUI(id, state) {
            const el = document.getElementById(`status-${id}`);
            if (!el) return;
            el.innerText = state === 'ON' ? "開啟中" : "已關閉";
            el.className = `device-status bg-${state === 'ON' ? 'success' : 'danger'} text-white`;
            localStorage.setItem(`fish_state_${id}`, state);
        }

        function restoreLocalState() {
            const savedPump = localStorage.getItem('fish_state_pump');
            if (savedPump) updateDeviceUI('pump', savedPump);
            const savedLight = localStorage.getItem('fish_state_light');
            if (savedLight) updateDeviceUI('light', savedLight);
        }

        function logEventToServer(eventType, message) {
            fetch('api/log_event.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_type: eventType, message: message })
            }).catch(err => console.error("Log upload failed:", err));
        }

        function fetchLogs() {
            fetch('api/logs.php').then(r => r.json()).then(data => {
                const tbody = document.getElementById('log-table-body');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-3 text-muted">等待系統數據同步...</td></tr>';
                    return;
                }
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    let badgeClass = "bg-secondary";
                    if (row.event_type === "FEEDER") badgeClass = "bg-warning text-dark";
                    if (row.event_type === "AUTO_CONTROL" || row.event_type === "ALARM") badgeClass = "bg-danger";
                    if (row.event_type === "VIDEO") badgeClass = "bg-info text-dark";
                    if (row.event_type === "MQTT" || row.event_type === "SYSTEM") badgeClass = "bg-success";
                    if (row.event_type === "MANUAL") badgeClass = "bg-primary";
                    tr.innerHTML = `<td class="text-nowrap">${row.timestamp}</td><td><span class="badge ${badgeClass}">${row.event_type}</span></td><td>${row.message}</td>`;
                    tbody.appendChild(tr);
                });
            }).catch(e => console.error(e));
        }

        function pub(topic, payload) {
            if (!mqttClient || !mqttClient.isConnected()) {
                let deviceId = topic.split('/').pop();
                fetch('api/control.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device: deviceId, action: payload })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status !== 'success') alert("控制失敗: " + data.error);
                    })
                    .catch(() => alert("請先連線 MQTT 或檢查網路！"));
                return;
            }
            let message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            mqttClient.send(message);
        }

        function showToast(msg) {
            const t = document.getElementById("toast-msg");
            t.innerText = msg; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 2500);
        }

        function initSystem() {
            restoreLocalState();
            fetch('api/settings.php').then(r => r.json()).then(d => {
                currentUuidPumpFeeder = d.uuid_pump_feeder || "1afe34d3020b";
                currentUuidLight = d.uuid_light || "a220a61487a6";
                document.getElementById('uuid_pump_feeder').value = currentUuidPumpFeeder;
                document.getElementById('uuid_light').value = currentUuidLight;
                document.getElementById('mqtt_broker').value = d.mqtt_broker || "mqttgo.io";
                document.getElementById('mqtt_port').value = d.mqtt_port || "8084";
                document.getElementById('topic_sensors').value = d.topic_sensors || "ttu_fish/sensors";
                document.getElementById('rtsp_url').value = d.rtsp_url || "";
                document.getElementById('rtsp_url_2').value = d.rtsp_url_2 || "";
                document.getElementById('telegram_bot_token').value = d.telegram_bot_token || "";
                document.getElementById('telegram_chat_id').value = d.telegram_chat_id || "";

                if (d.rtsp_url) document.getElementById('cam-iframe').src = d.rtsp_url;
                if (d.rtsp_url_2) document.getElementById('cam-iframe-2').src = d.rtsp_url_2;
                startMQTT(d);
            }).catch(() => logEventToServer('SYSTEM', '連線伺服器讀取設定失敗'));

            fetchLogs();
            setInterval(fetchLogs, 3000);
        }

        function startMQTT(config) {
            if (mqttClient && mqttClient.isConnected()) mqttClient.disconnect();
            const cid = "WebFish_" + Math.random().toString(16).substr(2, 8);
            mqttClient = new Paho.MQTT.Client(config.mqtt_broker, Number(config.mqtt_port), cid);

            mqttClient.onMessageArrived = (msg) => {
                if (msg.destinationName === config.topic_sensors) {
                    const data = JSON.parse(msg.payloadString);
                    document.getElementById("val_temp").innerText = data.temp || "--";
                    document.getElementById("val_ph").innerText = data.ph || "--";
                    document.getElementById("val_tds").innerText = data.tds || "--";
                    document.getElementById("val_ntu").innerText = data.ntu || "--";
                    document.getElementById("val_level").innerText = data.level || "--";
                    const lp = Math.min((parseInt(data.level || 0) / 4095) * 100, 100);
                    document.getElementById("bar_level").style.width = lp + "%";
                    document.getElementById("bar_level").innerText = lp.toFixed(0) + "%";
                }
                else if (msg.destinationName.startsWith("ttu_fish/state/")) {
                    const deviceType = msg.destinationName.split("/").pop();
                    updateDeviceUI(deviceType, msg.payloadString);
                }
            };

            mqttClient.onConnectionLost = () => {
                document.getElementById("mqtt-status-dot").className = "status-dot status-offline";
                document.getElementById("status-text").innerText = "MQTT 斷線";
            };

            mqttClient.connect({
                onSuccess: () => {
                    document.getElementById("mqtt-status-dot").className = "status-dot status-online";
                    document.getElementById("status-text").innerText = "MQTT 已連線";
                    mqttClient.subscribe(config.topic_sensors);
                    mqttClient.subscribe("ttu_fish/state/#");
                },
                useSSL: true, timeout: 3
            });
        }

        function saveSettings(e) {
            e.preventDefault();
            const payload = {
                uuid_pump_feeder: document.getElementById('uuid_pump_feeder').value,
                uuid_light: document.getElementById('uuid_light').value,
                mqtt_broker: document.getElementById('mqtt_broker').value,
                mqtt_port: document.getElementById('mqtt_port').value,
                topic_sensors: document.getElementById('topic_sensors').value,
                rtsp_url: document.getElementById('rtsp_url').value,
                rtsp_url_2: document.getElementById('rtsp_url_2').value,
                telegram_bot_token: document.getElementById('telegram_bot_token').value,
                telegram_chat_id: document.getElementById('telegram_chat_id').value
            };

            fetch('api/settings.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(d => {
                if (d.status === 'success') {
                    showToast("✅ 設定儲存成功！");
                    logEventToServer('SYSTEM', '設定已更新');
                    currentUuidPumpFeeder = payload.uuid_pump_feeder;
                    currentUuidLight = payload.uuid_light;
                    initSystem();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initSystem);
    </script>
</body>

</html>
